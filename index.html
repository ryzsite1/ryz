<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="RYZ | Authorization Portal">
    <meta property="og:description" content="The best and free nuke bot. Contact f2bx if you have a problem.">
    <meta property="og:url" content="https://1ryz1.netlify.app/">
    <meta name="theme-color" content="#ff3333">
    <meta property="og:type" content="website">

    <title>RYZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; 
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            color: #ff3333;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(to right, #111 1px, transparent 1px),
                linear-gradient(to bottom, #111 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: rotateX(45deg);
            animation: moveGrid 15s linear infinite;
        }

        @keyframes moveGrid {
            from { transform: perspective(500px) rotateX(45deg) translateY(0); }
            to { transform: perspective(500px) rotateX(45deg) translateY(50px); }
        }

        .portal-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #ff3333;
            padding: 4rem;
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.15);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px #ff3333;
        }

        .status-text {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .btn-container {
            display: flex; 
            gap: 15px; 
            justify-content: center;
        }

        .action-btn {
            display: inline-block;
            text-decoration: none;
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 12px 24px; 
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.4s ease;
        }

        .action-btn:hover {
            background: #ff3333;
            color: #000;
            box-shadow: 0 0 20px #ff3333;
            transform: translateY(-2px);
        }

        #cursor {
            width: 30px; height: 30px;
            border: 1px solid #ff3333;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out;
            display: flex; justify-content: center; align-items: center;
        }
        
        #cursor::after {
            content: '';
            width: 4px; height: 4px;
            background: #ff3333;
        }

        #terminal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.7rem;
            color: #333;
            pointer-events: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div id="cursor"></div>

    <div class="portal-card">
        <h1>RYZ BOT</h1>
        <p class="status-text">the best free raid & nuke bot out there.</p>
        
        <div class="btn-container">
            <a href="https://discord.com/oauth2/authorize?client_id=1480689023763878141" class="action-btn">
                INVITE
            </a>
            <a href="https://discord.gg/Yf228Tq6Jd" class="action-btn">
                JOIN DISCORD
            </a>
        </div>
    </div>

    <div id="terminal"></div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 15 + 'px';
            cursor.style.top = e.clientY - 15 + 'px';
        });

        document.addEventListener('mousedown', () => cursor.style.transform = 'scale(0.8)');
        document.addEventListener('mouseup', () => cursor.style.transform = 'scale(1)');

        const terminal = document.getElementById('terminal');
        const logs = [
            "> Connecting to Discord API...",
            "> Shard ID: 67676767676767",
            "> Bypassing Gateway...",
            "> *farts cutely*",
            "> Payload Ready...",
            "> if u see this f2bx fuckin hates u"
        ];
        
        let i = 0;
        setInterval(() => {
            const line = document.createElement('div');
            line.textContent = logs[i % logs.length];
            terminal.appendChild(line);
            if (terminal.childNodes.length > 5) terminal.removeChild(terminal.firstChild);
            i++;
        }, 2000);
    </script>
</body>
</html>
